[build]
  publish = "."

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[headers]]
  for = "/admin.html"
    [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/dashboard.html"
    [headers.values]
    X-Robots-Tag = "noindex"
